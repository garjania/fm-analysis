<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MM-Datasets — Results Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <div class="logo-text">
          <span class="logo-title">MM-Datasets</span>
          <span class="logo-sub">Results Dashboard</span>
        </div>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav" id="sidebarNav">
      <!-- Sections injected by JS -->
    </nav>

    <div class="sidebar-footer">
      <span class="sidebar-footer-text">MM-Datasets · 2026</span>
    </div>
  </aside>

  <!-- Main content -->
  <div class="main-wrapper">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" id="mobileMenuBtn">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <h1 class="page-title" id="pageTitle">Scaling Trends</h1>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="3.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M9 1v2M9 15v2M1 9h2M15 9h2M3.22 3.22l1.42 1.42M13.36 13.36l1.42 1.42M14.78 3.22l-1.42 1.42M4.64 13.36l-1.42 1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M15 9.5A6.5 6.5 0 0 1 8.5 3a6.5 6.5 0 1 0 6.5 6.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="content" id="content">
      <!-- Sections rendered here by JS -->
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
